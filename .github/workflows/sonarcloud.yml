# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# This workflow helps you trigger a SonarCloud analysis of your code and populates
# GitHub Code Scanning alerts with the vulnerabilities found.
# Free for open source project.

# 1. Login to SonarCloud.io using your GitHub account

# 2. Import your project on SonarCloud
#     * Add your GitHub organization first, then add your repository as a new project.
#     * Please note that many languages are eligible for automatic analysis,
#       which means that the analysis will start automatically without the need to set up GitHub Actions.
#     * This behavior can be changed in Administration > Analysis Method.
#
# 3. Follow the SonarCloud in-product tutorial
#     * a. Copy/paste the Project Key and the Organization Key into the args parameter below
#          (You'll find this information in SonarCloud. Click on "Information" at the bottom left)
#
#     * b. Generate a new token and add it to your Github repository's secrets using the name SONAR_TOKEN
#          (On SonarCloud, click on your avatar on top-right > My account > Security
#           or go directly to https://sonarcloud.io/account/security/)

# Feel free to take a look at our documentation (https://docs.sonarcloud.io/getting-started/github/)
# or reach out to our community forum if you need some help (https://community.sonarsource.com/c/help/sc/9)

name: SonarCloud analysis

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  pull-requests: read # allows SonarCloud to decorate PRs with analysis results

jobs:
  junit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./TicketReservationApp/gradlew

      - name: Create local.properties
        run: |
          SDK_PATH="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}}"
          if [ ! -d "$SDK_PATH" ]; then
            echo "Android SDK directory not found at: $SDK_PATH"
            exit 1
          fi
          echo "sdk.dir=$SDK_PATH" > ./TicketReservationApp/local.properties

      - name: Run JUnit 5 tests
        working-directory: ./TicketReservationApp
        run: ./gradlew testDebugUnitTest --no-daemon --stacktrace

      - name: Upload JUnit 5 test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-test-results
          path: |
            TicketReservationApp/app/build/test-results/
            TicketReservationApp/app/build/reports/tests/
          if-no-files-found: warn

  Analysis:
    runs-on: ubuntu-latest
    needs: junit
    if: ${{ needs.junit.result == 'success' }}
    permissions:
      contents: read # allows SonarCloud to read the repository's code for analysis
      pull-requests: write # allows SonarCloud to decorate PRs with analysis results
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better analysis of branches and pull requests

      - name: Download JUnit 5 test results
        uses: actions/download-artifact@v4
        with:
          name: junit-test-results
          path: .

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./TicketReservationApp/gradlew

      - name: Create local.properties
        run: |
          SDK_PATH="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}}"
          if [ ! -d "$SDK_PATH" ]; then
            echo "Android SDK directory not found at: $SDK_PATH"
            exit 1
          fi
          echo "sdk.dir=$SDK_PATH" > ./TicketReservationApp/local.properties

      - name: Build and Analyze
        working-directory: ./TicketReservationApp
        # assembleDebug ensures .class files are generated for Sonar
        run: ./gradlew assembleDebug sonar --no-daemon -Dsonar.token=${{ secrets.SONAR_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
