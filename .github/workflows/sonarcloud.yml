# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# This workflow helps you trigger a SonarCloud analysis of your code and populates
# GitHub Code Scanning alerts with the vulnerabilities found.
# Free for open source project.

# 1. Login to SonarCloud.io using your GitHub account

# 2. Import your project on SonarCloud
#     * Add your GitHub organization first, then add your repository as a new project.
#     * Please note that many languages are eligible for automatic analysis,
#       which means that the analysis will start automatically without the need to set up GitHub Actions.
#     * This behavior can be changed in Administration > Analysis Method.
#
# 3. Follow the SonarCloud in-product tutorial
#     * a. Copy/paste the Project Key and the Organization Key into the args parameter below
#          (You'll find this information in SonarCloud. Click on "Information" at the bottom left)
#
#     * b. Generate a new token and add it to your Github repository's secrets using the name SONAR_TOKEN
#          (On SonarCloud, click on your avatar on top-right > My account > Security
#           or go directly to https://sonarcloud.io/account/security/)

# Feel free to take a look at our documentation (https://docs.sonarcloud.io/getting-started/github/)
# or reach out to our community forum if you need some help (https://community.sonarsource.com/c/help/sc/9)

name: SonarCloud analysis

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  pull-requests: read # allows SonarCloud to decorate PRs with analysis results

jobs:
  junit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./TicketReservationApp/gradlew

      - name: Create local.properties
        run: |
          SDK_PATH="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}}"
          if [ ! -d "$SDK_PATH" ]; then
            echo "Android SDK directory not found at: $SDK_PATH"
            exit 1
          fi
          echo "sdk.dir=$SDK_PATH" > ./TicketReservationApp/local.properties

      - name: Run JUnit 5 tests
        working-directory: ./TicketReservationApp
        run: ./gradlew testDebugUnitTest --no-daemon --stacktrace

      - name: Upload JUnit 5 test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-test-results
          path: |
            TicketReservationApp/app/build/test-results/
            TicketReservationApp/app/build/reports/tests/
          if-no-files-found: warn

  Analysis:
    runs-on: ubuntu-latest
    needs: junit
    if: ${{ needs.junit.result == 'success' }}
    permissions:
      contents: read # allows SonarCloud to read the repository's code for analysis
      pull-requests: write # allows SonarCloud to decorate PRs with analysis results
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better analysis of branches and pull requests

      - name: Download JUnit 5 test results
        uses: actions/download-artifact@v4
        with:
          name: junit-test-results
          path: .

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./TicketReservationApp/gradlew

      - name: Create local.properties
        run: |
          SDK_PATH="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}}"
          if [ ! -d "$SDK_PATH" ]; then
            echo "Android SDK directory not found at: $SDK_PATH"
            exit 1
          fi
          echo "sdk.dir=$SDK_PATH" > ./TicketReservationApp/local.properties

      - name: Build Java classes for Sonar analysis
        working-directory: ./TicketReservationApp
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Detect Java binaries path
        id: detect_java_binaries
        run: |
          CANDIDATES=(
            "TicketReservationApp/app/build/intermediates/javac/debug/compileDebugJavaWithJavac/classes"
            "TicketReservationApp/app/build/intermediates/javac/debug/classes"
            "TicketReservationApp/app/build/intermediates/javac/release/compileReleaseJavaWithJavac/classes"
          )

          for path in "${CANDIDATES[@]}"; do
            if [ -d "$path" ]; then
              echo "path=$path" >> "$GITHUB_OUTPUT"
              echo "Using sonar.java.binaries=$path"
              exit 0
            fi
          done

          echo "No compiled Java classes directory found."
          find TicketReservationApp/app/build/intermediates -maxdepth 8 -type d | grep -E 'javac|classes$' || true
          exit 1

      - name: Analyze with SonarCloud
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_HOST_URL: https://sonarcloud.io
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}   # Generate a token on Sonarcloud.io, add it to the secrets of this repo with the name SONAR_TOKEN (Settings > Secrets > Actions > add new repository secret)
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Auto-generated by GitHub, used to decorate PRs with analysis results. Do not modify.
        with:
          # Additional arguments for the SonarScanner CLI
          args:
            # Unique keys of your project and organization. You can find them in SonarCloud > Information (bottom-left menu)
            # mandatory
            -Dsonar.projectKey=Extinctable_soen-345
            -Dsonar.organization=extinctable
            -Dsonar.sources=TicketReservationApp/app/src/main/java
            -Dsonar.tests=TicketReservationApp/app/src/test/java
            -Dsonar.java.binaries=${{ steps.detect_java_binaries.outputs.path }}
            -Dsonar.junit.reportPaths=TicketReservationApp/app/build/test-results/testDebugUnitTest
            # Comma-separated paths to directories containing main source files.
            #-Dsonar.sources= # optional, default is project base directory
            # Comma-separated paths to directories containing test source files.
            #-Dsonar.tests= # optional. For more info about Code Coverage, please refer to https://docs.sonarcloud.io/enriching/test-coverage/overview/
            # Adds more detail to both client and server-side analysis logs, activating DEBUG mode for the scanner, and adding client-side environment variables and system properties to the server-side log of analysis report processing.
            #-Dsonar.verbose= # optional, default is false
          # When you need the analysis to take place in a directory other than the one from which it was launched, default is .
          projectBaseDir: .
