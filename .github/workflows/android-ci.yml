name: Android Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./TicketReservationApp/gradlew

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > ./TicketReservationApp/local.properties

      - name: Run unit tests
        working-directory: ./TicketReservationApp
        run: ./gradlew testDebugUnitTest --no-daemon --stacktrace