name: Android CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./TicketReservationApp/gradlew

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > ./TicketReservationApp/local.properties

      - name: Build with Gradle
        working-directory: ./TicketReservationApp
        run: ./gradlew build --no-daemon --stacktrace

      - name: Run unit tests
        working-directory: ./TicketReservationApp
        run: ./gradlew test --no-daemon --stacktrace

      - name: Generate test report
        if: always()
        working-directory: ./TicketReservationApp
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            TicketReservationApp/app/build/test-results/
            TicketReservationApp/app/build/reports/tests/

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: TicketReservationApp/app/build/outputs/apk/debug/*.apk

      - name: Run lint
        working-directory: ./TicketReservationApp
        run: ./gradlew lint --no-daemon

      - name: Upload lint results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-results
          path: TicketReservationApp/app/build/reports/lint-results*.html
