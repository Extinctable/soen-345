name: Android Lint

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./TicketReservationApp/gradlew

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > ./TicketReservationApp/local.properties

      - name: Run lint
        working-directory: ./TicketReservationApp
        run: ./gradlew lint --no-daemon --stacktrace

      - name: Upload lint results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-results
          path: TicketReservationApp/app/build/reports/lint-results*.html
